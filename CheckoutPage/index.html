<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout Page</title>
</head>

<body>
    <h1>Checkout</h1>
    <section>
        <h2>Your Cart</h2>
        <img src="techno-pova-curve.jpg" alt="Techno Pova Curve white version">
        <p>Techno Pova Cruve 5g white version</p>
        <p>&#8369;11,999</p>
    </section>

    <section>
        <h2>Payment Information</h2>
        <form action="" method="POST">
            <label for="card-name">Cardholder Name <span aria-hidden="true">*</span></label>
            <input type="text" id="card-name" name="card-name" required>
            <label for="card-number">Cardholder Number <span aria-hidden="true">*</span></label>
            <input type="text" id="card-number" name="card-number" aria-describedby="card-number-help" required>

            <p id="card-number-help">Please enter your 16-digit card number without
                spaces or dashes.</p>
            <label for="expiry-date">Expiry Date<span aria-hidden="true">*</span></label>
            <input type="text" id="expiry-date" name="expiry-date" placeholder="MM/YY">
            <label for="cvv">CVV<span aria-hidden="true">*</span></label>
            <input type="text" id="cvv" name="cvv">
            <button type="submit">Place Order</button>
        </form>
    </section>
</body>

</html>
