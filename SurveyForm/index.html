<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Survey Form</title>
</head>

<body>
    <h1 id="title">Web Development Job Hiring</h1>
    <p id="description">Thank you for taking time to help us improve the platform</p>
    <form action="#" id="survey-form" method="POST">
        <label for="name" id="name-label">Name</label>
        <input type="text" id="name" name="name" required placeholder="Enter your name">

        <label for="email" id="email-label">Email</label>
        <input type="email" id="email" name="email" required placeholder="Enter your email">

        <label for="number" id="number-label">Age(optional)</label>
        <input type="number" id="number" name="number" min="18" max="65" required placeholder="Age">

        <p>Which option best describes your current role?</p>
        <select name="dropdown" id="dropdown" required>
            <option value="" disabled selected>Select current role</option> <!-- Make default and not select this option -->
            <option value="front-end">Frontend Developer</option>
            <option value="back-end">Backend Developer</option>
            <option value="back-end">Full Stack Developer</option>
        </select>

        <p>Would you recommended Web Development Job Hiring to a friend?</p>
        <input type="radio" id="definitely" name="recommend" value="Definitely">
        <label for="definitely">Definitely</label>

        <input type="radio" id="maybe" name="recommend" value="Maybe">
        <label for="maybe">Maybe</label>

        <input type="radio" id="not-sure" name="recommend" value="Not-Sure">
        <label for="not-sure">Not sure</label>

        <p>What would you like to see improved? (Check all that apply)</p>
        <input type="checkbox" id="front-end-projects" name="front-end-projects" value="Frontend-Projects">
        <label for="front-end-projects">Frontend Projects</label>

        <input type="checkbox" id="front-end-projects" name="front-end-projects" value="Frontend-Projects">
        <label for="front-end-projects">Frontend</label>

        <input type="checkbox" id="logic" name="logic" value="Logics">
        <label for="logic">Logic</label>

        <input type="checkbox" id="design" name="design" value="Designs">
        <label for="design">Design</label>

        
        <input type="checkbox" id="ai-prompting" name="ai-prompting" value="AI-Prompting">
        <label for="ai-prompting">AI Prompting</label>

        <p>Any comments or suggestions?</p>
        <textarea name="comments" id="comments" placeholder="Enter your message here..."></textarea>

        <button id="submit">Submit</button>
    </form>
</body>

</html>
